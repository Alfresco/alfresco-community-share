version: 2
registries:
  maven-alfresco-internal:
    type: maven-repository
    url: https://artifacts.alfresco.com/nexus/content/groups/internal
    username: ${{secrets.NEXUS_USERNAME}}
    password: ${{secrets.NEXUS_PASSWORD}}
updates:
  - package-ecosystem: "maven"
    directory: "/"
    registries:
      - maven-alfresco-internal
    schedule:
      interval: "daily"
      time: "22:00"
      timezone: "Europe/London"
    # disabling versions updates, when set to 0 only security updates will open
    open-pull-requests-limit: 0
    allow:
      - dependency-type: "direct"
    ignore:
      - dependency-name: "org.alfresco:alfresco-share-*"
    groups:
      spring:
        patterns:
          - "org.springframework*"
      opensearch:
        patterns:
          - "org.alfresco*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "Master"
      - "github_actions"
    commit-message:
      prefix: "[GHA - Master]"

  #For 25.N
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "release/25.N"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "25.N"
      - "github_actions"
    commit-message:
      prefix: "[GHA - 25.N]"

  #For 23.N
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "release/23.N"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "23.N"
      - "github_actions"
    commit-message:
      prefix: "[GHA - 23.N]"
