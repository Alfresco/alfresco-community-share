name: alfresco_enterprise_share
# Set the default (global) permissions to read-only.
# Grant write permissions explicitly at the job level only where needed.
permissions:
  contents: read

on:
  push:
    branches:
      - "fix/**"
      - "feature/**"
  pull_request:
    branches:
      - master
      - "release/**"
  schedule:
    - cron: '0 13 * * *' # 18:30 IST nightly
  workflow_call:
    inputs:
      commitMessage:
        description: Enter the Commit Message
        required: false
        default: ''
        type: string
  workflow_dispatch:
    inputs:
      commitMessage:
        description: Enter the Commit Message
        required: true
        type: string
env:
  JAVA_VERSION: "21"
  HOSTED_ZONE: dev.envalfresco.com
  BRANCH_NAME: ${{ github.ref_name }}
  S3_BUCKET_REGION: "us-east-1"
  ALFRESCO_URL: "http://localhost:8080/alfresco/"
  SHARE_URL: "http://localhost:8181/share"
  DISPLAY: :99.0
  WEBDRIVER_ARGUMENTS: '-Dwebdriver.local.grid=true -Dwebdriver.browser=RemoteFireFox -Dwebdriver.localGrid=false -Dorg.alfresco.rm.timeout_seconds.MEDIUM=30'
  GITHUB_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
  GITHUB_ACTIONS_DEPLOY_TIMEOUT: 120
  CHROME_VERSION: "132.0.6834.159-1"
  CHROME_DOWNLOAD_URL: "https://mirror.vitalinux.educa.aragon.es/google/pool/main/g/google-chrome-stable"

jobs:
  lint:
    if: (!contains(github.event.head_commit.message, '[no lint]') && inputs.commitMessage != '[no lint]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: Alfresco/alfresco-build-tools/.github/actions/setup-java-build@v12.4.3
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - uses: Alfresco/alfresco-build-tools/.github/actions/pre-commit@v12.4.3

  build:
    runs-on: ubuntu-latest
    if: >
      !contains(github.event.head_commit.message, '[no build]') &&
      inputs.commitMessage != '[no build]' &&
      !contains(github.event.head_commit.message, '[force') &&
      inputs.commitMessage != '[force'
    needs: lint
    env:
      MAVEN_USERNAME: ${{ secrets.NEXUS_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: Alfresco/alfresco-build-tools/.github/actions/setup-java-build@v12.4.3
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - uses: Alfresco/alfresco-build-tools/.github/actions/get-build-info@v12.4.3
      - name: "Init"
        run: bash scripts/ci/init.sh
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.x
      - name: "Prepare before Test"
        run: |
          export TAG_NAME="$(echo "${BRANCH_NAME}" | tr / - )"
          export NAMESPACE="travis-share-$GITHUB_RUN_NUMBER"
          pip3 install requests pytest==6.2.4 pytest-testinfra==6.3.0 jmespath==0.10.0
      - name: "Build"
        timeout-minutes: ${{ fromJSON(env.GITHUB_ACTIONS_DEPLOY_TIMEOUT) }}
        env:
          GIT_PASSWORD: ${{ secrets.BOT_GITHUB_TOKEN }}
          GIT_USERNAME: ${{ vars.BOT_GITHUB_USERNAME }}
        run: bash scripts/ci/build.sh
      - name: Run source_clear
        env:
          SRCCLR_API_TOKEN: ${{ secrets.SRCCLR_API_TOKEN }}
        run: bash scripts/ci/source_clear.sh
        continue-on-error: true

  veracode_sast_share:
    name: "Pipeline SAST Scan  - Share"
    runs-on: ubuntu-latest
    if: >
      (github.ref_name == 'master' || startsWith(github.ref_name, 'release/') || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') &&
      github.actor != 'dependabot[bot]' &&
      !contains(github.event.head_commit.message, '[skip tests]')
    env:
      MAVEN_USERNAME: ${{ secrets.NEXUS_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: Alfresco/alfresco-build-tools/.github/actions/get-build-info@v12.4.3
      - name: "Init"
        run: bash scripts/ci/init.sh
      - uses: Alfresco/alfresco-build-tools/.github/actions/setup-java-build@v12.4.3
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - name: "Build"
        timeout-minutes: ${{ fromJSON(env.GITHUB_ACTIONS_DEPLOY_TIMEOUT) }}
        env:
          GIT_PASSWORD: ${{ secrets.BOT_GITHUB_TOKEN }}
          GIT_USERNAME: ${{ vars.BOT_GITHUB_USERNAME }}
        run: bash scripts/ci/build.sh
      - name: "Prepare Share War for SAST Scan"
        run: |
          sudo mkdir sast_scan
          sudo cp share/target/share.war sast_scan
          cd sast_scan
          sudo jar -xvf share.war
          sudo rm -r WEB-INF/lib
          sudo rm -rf share.war
          sudo jar -cvf share.war *
      - uses: Alfresco/alfresco-build-tools/.github/actions/github-download-file@v12.4.3
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          repository: "Alfresco/veracode-baseline-archive"
          file-path: "alfresco-enterprise-share/enterprise-share-baseline.json"
          target: "baseline.json"
      - name: "Run SAST Scan"
        uses: veracode/Veracode-pipeline-scan-action@e7b4fe35b0cc32c530ca6d9c6737f0f7ea0ba4f7 # v1.0.21
        with:
          vid: '${{ secrets.VERACODE_API_ID }}'
          vkey: '${{ secrets.VERACODE_API_KEY }}'
          file: "sast_scan/share.war"
          include: "share.war"
          fail_build: true
          project_name: enterprise-share
          issue_details: true
          veracode_policy_name: Alfresco Default
          summary_output: true
          summary_output_file: results.json
          summary_display: true
          baseline_file: baseline.json
      - name: Upload scan result
        if: success() || failure()
        run: |
          if [ -f results.json ]; then
            zip readable_output.zip results.json
          fi
      - name: Upload Artifact
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Veracode Pipeline-Scan Results - Share (Human Readable)
          path: readable_output.zip
      - name: "Clean Maven cache"
        run: bash ./scripts/ci/cleanup_cache.sh

  pmd_scan:
    name: "PMD Scan"
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') &&
      !contains(github.event.head_commit.message, '[skip pmd]') &&
      !contains(github.event.head_commit.message, '[skip tests]') &&
      !contains(github.event.head_commit.message, '[force]')
    steps:
      - uses: Alfresco/ya-pmd-scan@v4.0.0
        with:
          fail-on-new-issues: "false"
          create-github-annotations: "false"
          classpath-enable: "false"

  build_docker_image:
    name: "Build Test Artifact - Docker Image"
    runs-on: ubuntu-latest
    needs: lint
    if: >
      !contains(github.event.head_commit.message, '[skip tests]') &&
      inputs.commitMessage != '[skip tests]' &&
      !contains(github.event.head_commit.message, '[force') &&
      inputs.commitMessage != '[force'
      &&
      github.event.repository.fork==false
    env:
      MAVEN_USERNAME: ${{ secrets.NEXUS_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: Alfresco/alfresco-build-tools/.github/actions/free-hosted-runner-disk-space@v12.4.3
      - uses: Alfresco/alfresco-build-tools/.github/actions/setup-java-build@v12.4.3
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - uses: Alfresco/alfresco-build-tools/.github/actions/get-build-info@v12.4.3
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.x
      - name: "Init"
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
        run: bash scripts/ci/init.sh
      - name: "Prepare before Test"
        run: |
          pip3 install requests pytest==6.2.4 pytest-testinfra==6.3.0 jmespath==0.10.0
      - name: Build Docker image
        env:
          GIT_PASSWORD: ${{ secrets.BOT_GITHUB_TOKEN }}
          GIT_USERNAME: ${{ vars.BOT_GITHUB_USERNAME }}
        run: |
          export TAG_NAME="latest"
          bash scripts/ci/create_swap.sh "5"
          bash scripts/ci/build.sh
      - name: Save Docker images
        run: |
          docker images
          mkdir -p docker-images
          docker save -o docker-images/alfresco-share.tar $(docker images --format "{{.Repository}}:{{.Tag}}" | grep -E "alfresco.*share|alfresco.*governance" | tr '\n' ' ')
      - name: Upload Docker images as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docker-images
          path: docker-images/
          retention-days: 1

  unit_tests:
    name: "Unit tests"
    runs-on: ubuntu-latest
    needs: build
    if: >
      !contains(github.event.head_commit.message, '[skip tests]') &&
      inputs.commitMessage != '[skip tests]' &&
      !contains(github.event.head_commit.message, '[force') &&
      inputs.commitMessage != '[force'
      &&
      github.event.repository.fork==false
    env:
      MAVEN_USERNAME: ${{ secrets.NEXUS_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        testModule: [ share, share-encryption, web-framework-commons ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: Alfresco/alfresco-build-tools/.github/actions/free-hosted-runner-disk-space@v12.4.3
      - uses: Alfresco/alfresco-build-tools/.github/actions/setup-java-build@v12.4.3
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - uses: Alfresco/alfresco-build-tools/.github/actions/get-build-info@v12.4.3
      - name: "Init"
        run: bash scripts/ci/init.sh
      - name: "Build"
        env:
          GIT_PASSWORD: ${{ secrets.BOT_GITHUB_TOKEN }}
          GIT_USERNAME: ${{ vars.BOT_GITHUB_USERNAME }}
        run: bash scripts/ci/build.sh
      - name: Run Unit Tests
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: ${{ fromJSON(env.GITHUB_ACTIONS_DEPLOY_TIMEOUT) }}
          max_attempts: 3
          retry_wait_seconds: 60
          retry_on: error
          warning_on_retry: true
          command: mvn -B test -pl ${{ matrix.testModule }} -DfailIfNoTests=false
      - name: "Clean Maven cache"
        run: bash ./scripts/ci/cleanup_cache.sh

  ags_unit_tests:
    name: "AGS Unit tests"
    runs-on: ubuntu-latest
    needs: build
    if: >
      !contains(github.event.head_commit.message, '[skip tests]') &&
      inputs.commitMessage != '[skip tests]' &&
      !contains(github.event.head_commit.message, '[force') &&
      inputs.commitMessage != '[force'
      &&
      github.event.repository.fork==false
    env:
      MAVEN_USERNAME: ${{ secrets.NEXUS_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        testModule: [ alfresco-governance-services-community-share, alfresco-governance-services-enterprise-share ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: Alfresco/alfresco-build-tools/.github/actions/free-hosted-runner-disk-space@v12.4.3
      - uses: Alfresco/alfresco-build-tools/.github/actions/setup-java-build@v12.4.3
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - uses: Alfresco/alfresco-build-tools/.github/actions/get-build-info@v12.4.3
      - name: "Init"
        run: bash scripts/ci/init.sh
      - name: "Build"
        env:
          GIT_PASSWORD: ${{ secrets.BOT_GITHUB_TOKEN }}
          GIT_USERNAME: ${{ vars.BOT_GITHUB_USERNAME }}
        run: bash scripts/ci/build.sh
      - name: Run ${{ matrix.testModule }} Unit Tests
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: ${{ fromJSON(env.GITHUB_ACTIONS_DEPLOY_TIMEOUT) }}
          max_attempts: 3
          retry_wait_seconds: 60
          retry_on: error
          warning_on_retry: true
          command: mvn -B test -Pags -pl :${{ matrix.testModule }} -DfailIfNoTests=false
      - name: "Clean Maven cache"
        run: bash ./scripts/ci/cleanup_cache.sh

  test:
    runs-on: ubuntu-latest
    needs: build_docker_image
    if: >
      !contains(github.event.head_commit.message, '[skip tests]') &&
      inputs.commitMessage != '[skip tests]' &&
      !contains(github.event.head_commit.message, '[force') &&
      inputs.commitMessage != '[force'
      &&
      github.event.repository.fork==false
    env:
      MAVEN_USERNAME: ${{ secrets.NEXUS_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        test: [ user, admin-tools, admin-console ,content-actions, content-filters, user-dashboard, userRolesAndPermissions, applying-rules, searching1, searching2, alfresco-content1, alfresco-content2, alfresco-content-and-site-features, task-and-workflows, site, site-dashboard, sitesFeatures-calendar, site-members, sitesFeatures-dataLists, sitesFeatures ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: Alfresco/alfresco-build-tools/.github/actions/free-hosted-runner-disk-space@v12.4.3
      - uses: Alfresco/alfresco-build-tools/.github/actions/setup-java-build@v12.4.3
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - uses: Alfresco/alfresco-build-tools/.github/actions/get-build-info@v12.4.3
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.x
      - name: "Init"
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: bash scripts/ci/init.sh
      - name: "Prepare before Test"
        run: |
          pip3 install requests pytest==6.2.4 pytest-testinfra==6.3.0 jmespath==0.10.0
      - name: Download Docker images
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docker-images
          path: docker-images/
      - name: Load Docker images
        run: |
          docker load -i docker-images/alfresco-share.tar
          docker images
      - name: Start Alfresco
        run: bash amps/ags/ci/scripts/startAlfresco.sh packaging/docker/docker-compose
      - name: Wait for Alfresco to start
        run: |
          bash amps/ags/ci/scripts/waitForAlfrescoToStart.sh
          sudo free -m -t
      - name: Run ${{ matrix.test }} Test
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: ${{ fromJSON(env.GITHUB_ACTIONS_DEPLOY_TIMEOUT) }}
          max_attempts: 3
          retry_wait_seconds: 60
          retry_on: error
          warning_on_retry: true
          command: bash scripts/ci/execute_share_web_docker.sh "${{ matrix.test }}-tests.xml" -Dgroups=SharePriority1 -DexcludedGroups=bug,tobefixed,tobedeleted
      - name: Debug Allure Output
        run: |
          echo "Listing allure results:"
          ls -R alfresco-tas-share-test
          echo "Searching for allure-results directories..."
          find alfresco-tas-share-test -type d -name "allure-results"
      - name: Upload Allure Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: allure-results-test-${{ matrix.test }}
          path: alfresco-tas-share-test/target/allure-results
          if-no-files-found: warn
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.test }}-tests
          path: |
            alfresco-tas-share-test/target/reports
            alfresco-tas-share-test/target/surefire-reports
            alfresco-tas-share-test/target/screenshots

  community_shared_UI_configuration:
    runs-on: ubuntu-latest
    if: >
      !contains(github.event.head_commit.message, '[skip tests]') &&
      inputs.commitMessage != '[skip tests]' &&
      !contains(github.event.head_commit.message, '[force') &&
      inputs.commitMessage != '[force'
      &&
      github.event.repository.fork == false
      &&
      (!contains(github.event.head_commit.message, '[skip ags]') &&
      inputs.commitMessage != '[skip ags]')
      &&
      (contains(github.event.head_commit.message, '[community ags]') ||
      inputs.commitMessage == '[community ags]')
    needs: build_docker_image
    env:
      MAVEN_USERNAME: ${{ secrets.NEXUS_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        test: [ communitySmokeRMSite, communityLevel2Tests, communityL2AuditRulesDashboardNodeBrowserTests ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: Alfresco/alfresco-build-tools/.github/actions/setup-java-build@v12.4.3
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - uses: Alfresco/alfresco-build-tools/.github/actions/get-build-info@v12.4.3
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.x
      - name: "Init"
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: bash scripts/ci/init.sh
      - name: "Prepare before Test"
        run: |
          pip3 install requests pytest==6.2.4 pytest-testinfra==6.3.0 jmespath==0.10.0
      - name: Download Docker images
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docker-images
          path: docker-images/
      - name: Load Docker images
        run: |
          docker load -i docker-images/alfresco-share.tar
          docker images
      - name: Tag Docker image
        run: |
          docker images
          docker image tag alfresco/alfresco-governance-repository-community-base:$(docker images | grep '^alfresco/alfresco-governance-repository-community-base ' | head -1 | awk '{print $2}') alfresco/alfresco-governance-repository-community-base:latest
          docker images
      - name: "Install Firefox 43.0.1"
        run: |
          sudo apt-get install libgtk2.0-0
          wget https://ftp.mozilla.org/pub/firefox/releases/43.0.1/linux-x86_64/en-GB/firefox-43.0.1.tar.bz2
          tar xvf firefox-43.0.1.tar.bz2
          sudo rm -rf /opt/firefox*
          sudo mv firefox /opt/firefox
          sudo ln -sf /opt/firefox/firefox /usr/bin/firefox
          export PATH=/opt/firefox/firefox:$PATH
          firefox --version
      - name: Start Alfresco
        run: |
          bash amps/ags/ci/scripts/startAlfresco.sh amps/ags/rm-community/rm-community-share
          bash amps/ags/ci/scripts/waitForAlfrescoToStart.sh
          sudo free -m -t
      - name: Run tests
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: ${{ fromJSON(env.GITHUB_ACTIONS_DEPLOY_TIMEOUT) }}
          max_attempts: 3
          retry_wait_seconds: 60
          retry_on: error
          warning_on_retry: true
          command: xvfb-run --server-args="-screen 0 1920x1080x24" mvn -B test -pl :alfresco-governance-services-automation-ui -Pags -Dskip.automationtests=false -DsuiteXmlFile=${{ matrix.test }}.xml -Dshare.url=$SHARE_URL -Dalfresco.url=$ALFRESCO_URL $WEBDRIVER_ARGUMENTS
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: allure-results-community_shared_ui_configuration-${{ matrix.test }}
          path: amps/ags/rm-automation/rm-automation-ui/target/allure-results
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ags/community/${GITHUB_RUN_NUMBER}/${JOB_NAME}
          path:
            amps/ags/rm-automation/rm-automation-ui/target/surefire-reports
            amps/ags/rm-automation/rm-automation-ui/target/reports
            amps/ags/rm-automation/rm-automation-ui/target/screenshots
            alfresco.log
            solr.log
            share.log
      - name: Get logs
        run: bash amps/ags/ci/scripts/getLogs.sh

  enterprise_shared_UI_configuration:
    runs-on: ubuntu-latest
    if: >
      (!contains(github.event.head_commit.message, '[skip tests]') &&
      inputs.commitMessage != '[skip tests]') &&
      (!contains(github.event.head_commit.message, '[force') &&
      inputs.commitMessage != '[force')
      &&
      (github.event.repository.fork==false)
      &&
      (((github.ref_name == 'master' || startsWith(github.ref_name, 'release/')) &&
      (!contains(github.event.head_commit.message, '[skip ags]')
      && inputs.commitMessage != '[skip ags]')) || (contains(github.event.head_commit.message, '[ags]')
      || inputs.commitMessage == '[ags]'))
      ||
      (github.event_name == 'pull_request' && (github.base_ref == 'master' || startsWith(github.base_ref, 'release/')))
    needs: build_docker_image
    strategy:
      fail-fast: false
      matrix:
        test: [communityLevel2Tests, communityL2AuditRulesDashboardNodeBrowserTests, enterpriseLevel2Tests, enterpriseLevel2ClassificationTests, enterpriseRecordsClassificationTests, enterpriseFoldersClassificationTests, enterpriseDocumentsClassificationTests, enterpriseSecurityMarksTests, enterpriseConsoleGuidesAndConfiguration]
    env:
      S3_BUCKET_PREFIX: ${{ vars.S3_BUCKET_PREFIX }}
      S3_BUCKET_NAME: ${{ vars.S3_BUCKET_PREFIX }}-${{ github.run_number }}
      S3_BUCKET2_NAME: ${{ vars.S3_BUCKET_PREFIX }}-worm-b2
      MAVEN_USERNAME: ${{ secrets.NEXUS_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
      AGS_AWS_ACCESS_KEY_ID: ${{ secrets.AGS_AWS_ACCESS_KEY_ID }}
      AGS_AWS_SECRET_ACCESS_KEY: ${{ secrets.AGS_AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: Alfresco/alfresco-build-tools/.github/actions/free-hosted-runner-disk-space@v12.4.3
      - uses: Alfresco/alfresco-build-tools/.github/actions/setup-java-build@v12.4.3
        with:
          java-version: ${{ env.JAVA_VERSION }}
      - uses: Alfresco/alfresco-build-tools/.github/actions/get-build-info@v12.4.3
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.x
      - name: Install google chrome version
        run: |
            sudo apt-get purge google-chrome-stable
            sudo apt-get autoremove
            rm -rf ~/.config/google-chrome
            rm -rf ~/.cache/google-chrome
            wget ${{ env.CHROME_DOWNLOAD_URL }}/google-chrome-stable_${{ env.CHROME_VERSION }}_amd64.deb
            sudo apt-get install libu2f-udev
            sudo dpkg -i google-chrome-stable_${{ env.CHROME_VERSION }}_amd64.deb
            sudo apt-mark hold google-chrome-stable
            google-chrome --version
            sudo apt-mark showhold | grep google-chrome-stable
      - name: "Init"
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: bash scripts/ci/init.sh
      - name: "Prepare before Test"
        run: |
          pip3 install requests pytest==6.2.4 pytest-testinfra==6.3.0 jmespath==0.10.0
      - name: "Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          aws-access-key-id: ${{ secrets.AGS_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AGS_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.S3_BUCKET_REGION }}
      - name: Download Docker images
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docker-images
          path: docker-images/
      - name: Load Docker images
        run: |
          docker load -i docker-images/alfresco-share.tar
          docker images
          firefox --version
      - name: Tag Docker image
        run: |
          docker images
          docker image tag alfresco/alfresco-governance-repository-enterprise-base:$(docker images --format "{{.Repository}}:{{.Tag}}" | grep '^alfresco/alfresco-governance-repository-enterprise-base:' | head -1 | cut -d: -f2) alfresco/alfresco-governance-repository-enterprise-base:latest
          docker images
      - name: Start Alfresco
        if: env.S3_BUCKET_PREFIX != ''
        run: |
          if [ ${{ matrix.test }} == 'wormTestSuite' ]; then echo "Starting Alfresco with WORM support"
            amps/ags/ci/scripts/create-worm-bucket.sh
            amps/ags/ci/scripts/start-compose.sh amps/ags/rm-enterprise/rm-enterprise-share/docker-compose-worm-support-ui.yml
          else
            amps/ags/ci/scripts/startAlfresco.sh amps/ags/rm-enterprise/rm-enterprise-share
          fi
          amps/ags/ci/scripts/waitForAlfrescoToStart.sh
          free -m -t
      - name: Run tests
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: ${{ fromJSON(env.GITHUB_ACTIONS_DEPLOY_TIMEOUT) }}
          max_attempts: 3
          retry_wait_seconds: 60
          retry_on: error
          warning_on_retry: true
          command: xvfb-run --server-args="-screen 0 1920x1080x24" mvn -B test -pl :alfresco-governance-services-automation-ui -Pags -Dskip.automationtests=false -DsuiteXmlFile=${{ matrix.test }}.xml -Dgroups=sanity -DexcludedGroups=needsAttention,bug -Dshare.url=$SHARE_URL -Dalfresco.url=$ALFRESCO_URL $WEBDRIVER_ARGUMENTS
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: allure-results-enterprise_shared_ui_configuration-${{ matrix.test }}
          path: amps/ags/rm-automation/rm-automation-ui/target/allure-results
          if-no-files-found: warn
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ags-${{matrix.test}}-${GITHUB_RUN_NUMBER}-${JOB_NAME}-${{ github.run_id}}-${{ github.run_attempt }}
          path: |
            amps/ags/rm-automation/rm-automation-ui/target/surefire-reports
            amps/ags/rm-automation/rm-automation-ui/target/reports
            amps/ags/rm-automation/rm-automation-ui/target/screenshots
            alfresco.log
            solr.log
            share.log
      - name: Get logs
        run: bash amps/ags/ci/scripts/getLogs.sh

  publish_test_results:
    name: Publish Test Results
    runs-on: ubuntu-latest
    needs:
      - unit_tests
      - ags_unit_tests
      - test
      #     - community_shared_UI_configuration
      - enterprise_shared_UI_configuration
    if: always()

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Download all artifacts from test jobs
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./artifacts

      # Merge Allure Results for each suite
      - name: Merge Allure Results for Share
        run: |
          mkdir -p merged-allure-results-share
          for dir in ./artifacts/allure-results-test-*; do
            if [ -d "$dir" ]; then
              echo "Merging from $dir"
              rsync -av "$dir"/ merged-allure-results-share/
            else
              echo "No matching Share Allure results directory found for pattern: $dir"
            fi
          done
      - name: Merge Allure Results for Enterprise Shared UI Config
        run: |
          mkdir -p merged-allure-results-enterprise
          for dir in ./artifacts/allure-results-enterprise_shared_ui_configuration-*; do
            if [ -d "$dir" ]; then
              echo "Merging from $dir"
              rsync -av "$dir"/ merged-allure-results-enterprise/
            else
              echo "No matching Enterprise Shared UI Config Allure results directory found for pattern: $dir"
            fi
          done
#      - name: Merge Allure Results for Community Shared UI Config
#        run: |
#          mkdir -p merged-allure-results-community
#          for dir in ./artifacts/allure-results-community_shared_ui_configuration-*; do
#            echo "Merging from $dir"
#            rsync -av "$dir"/ merged-allure-results-community/
#          done

      # Install exact matching CLI version
      - name: Install Allure CLI
        run: |
          npm install -g allure-commandline@2.32.0
          allure --version

      # Generate and upload reports for each suite
      - name: Generate Share Allure Report
        run: |
          allure generate merged-allure-results-share -o merged-allure-report-share --clean
      - name: Upload Share Allure Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: allure-report-share
          path: merged-allure-report-share

      - name: Generate Enterprise Shared UI Config Allure Report
        run: |
          allure generate merged-allure-results-enterprise -o merged-allure-report-enterprise --clean
      - name: Upload Enterprise Shared UI Config Allure Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: allure-report-enterprise_shared_ui_configuration
          path: merged-allure-report-enterprise

#      - name: Generate Community Shared UI Config Allure Report
#        run: |
#          allure generate merged-allure-results-community -o merged-allure-report-community --clean
#      - name: Upload Community Shared UI Config Allure Report
#        uses: actions/upload-artifact@v4
#        with:
#          name: allure-report-community_shared_ui_configuration
#          path: merged-allure-report-community

      # (Optional) Add summary table generation for each suite here

      # Summary
      - name: Summarize Test Results
        run: python3 scripts/ci/summarize_test_results.py

      - name: Publish Markdown Summary
        run: cat test-summary.md >> $GITHUB_STEP_SUMMARY

      - name: Upload HTML Test Summary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-summary-html
          path: test-summary.html

      - name: Clean S3 buckets
        if: ${{ always() && matrix.test == 'wormTestSuite'}}
        run: scripts/ci/cleanup.sh

      - name: Add Allure Report Instructions to Summary
        if: always()
        run: |
          echo "## 📊 Allure Reports" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The Allure HTML reports are uploaded as workflow artifacts by the following steps in this job:" >> $GITHUB_STEP_SUMMARY
          echo "- **Upload Share Allure Report** (artifact: \`allure-report-share\`)" >> $GITHUB_STEP_SUMMARY
          echo "- **Upload Enterprise Shared UI Config Allure Report** (artifact: \`allure-report-enterprise_shared_ui_configuration\`)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "You can download these artifacts from the **Artifacts** section of this workflow run." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [Open Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
