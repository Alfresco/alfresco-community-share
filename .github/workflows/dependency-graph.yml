name: "Load Dependency Graph"

on:
  push:
    branches:
      - "master"
      - "release/25.N"
      - "release/23.N"
  schedule:
    - cron: '0 6 * * *'
  workflow_call:
  workflow_dispatch:

jobs:
  scan-dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: Alfresco/alfresco-build-tools/.github/actions/maven-dependency-scan@v18.19.1
        with:
          java-version: '21'
          maven-version: '3.9.9'
          maven-args: -Dscopes=compile,runtime -Pags
          maven-username: ${{ secrets.NEXUS_USERNAME }}
          maven-password: ${{ secrets.NEXUS_PASSWORD }}
          maven-settings-path: ".ci.settings.xml"
